apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 3
  template:
    metadata:
      labels:
        track: stable
    spec:
      containers:
        - name: myapp
          env:
            - name: APP_ENV
              value: production
            - name: APP_VERSION
              value: 0.1.0
