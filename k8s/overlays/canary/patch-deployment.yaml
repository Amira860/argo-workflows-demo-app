apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
      track: canary
  template:
    metadata:
      labels:
        track: canary
    spec:
      containers:
        - name: myapp
          env:
            - name: APP_ENV
              value: canary
            - name: APP_VERSION
              value: canary
