apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  selector:
    matchLabels:
      app: myapp
      track: green
  template:
    metadata:
      labels:
        track: green
    spec:
      containers:
        - name: myapp
          env:
            - name: APP_ENV
              value: green
            - name: APP_VERSION
              value: green
